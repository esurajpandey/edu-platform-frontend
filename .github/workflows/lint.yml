name: Lint, Type Check & Build

on:
  pull_request:
    branches: [develop]

jobs:
  lint-and-format:
    name: Lint & Prettier Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            yarn install --frozen-lockfile --prefer-offline && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "yarn install failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "yarn install failed after 3 attempts."
          exit 1

      - name: Run ESLint
        run: yarn lint

      - name: Check Prettier
        run: yarn format:check

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - run: |
          for attempt in 1 2 3; do
            yarn install --frozen-lockfile --prefer-offline && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "yarn install failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "yarn install failed after 3 attempts."
          exit 1
      - run: yarn type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check]

    steps:
      - uses: actions/checkout@v5
      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - run: |
          for attempt in 1 2 3; do
            yarn install --frozen-lockfile --prefer-offline && exit 0
            if [ "$attempt" -lt 3 ]; then
              echo "yarn install failed on attempt $attempt. Retrying in 15 seconds..."
              sleep 15
            fi
          done
          echo "yarn install failed after 3 attempts."
          exit 1
      - run: yarn build
